# Build & publish Zelari Desktop installers on version tags.
# Complements publish.yml (npm CLI + @zelari/core).
name: Release Desktop

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build (e.g. v1.9.4)'
        required: true

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
          - platform: ubuntu-22.04

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux WebKit deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install monorepo deps
        run: npm ci

      # Fresh checkout has no packages/core/dist — root tsc needs those .d.ts files.
      - name: Build @zelari/core
        run: npm run build --workspace=@zelari/core

      - name: Build CLI
        run: npm run build

      - name: Install desktop deps
        working-directory: apps/desktop
        run: npm ci

      - name: Resolve tag / version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          TAG_VERSION="${TAG#v}"
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          echo "plain=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG version=$TAG_VERSION"

      - name: Verify desktop version matches tag
        shell: bash
        run: |
          PKG=$(node -e "console.log(require('./apps/desktop/package.json').version)")
          CONF=$(node -e "console.log(require('./apps/desktop/src-tauri/tauri.conf.json').version)")
          if [ "${{ steps.ver.outputs.plain }}" != "$PKG" ] || [ "${{ steps.ver.outputs.plain }}" != "$CONF" ]; then
            echo "Tag ${{ steps.ver.outputs.plain }} must match desktop package ($PKG) and tauri.conf ($CONF)"
            exit 1
          fi
          echo "✓ Desktop version $PKG matches tag"

      # createUpdaterArtifacts requires TAURI_SIGNING_PRIVATE_KEY. Without it,
      # disable artifacts so installers still build (auto-update just won't work).
      - name: Configure updater artifacts for signing
        shell: bash
        env:
          HAS_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$HAS_KEY" ]; then
            node <<'NODE'
          const fs = require('fs');
          const p = 'apps/desktop/src-tauri/tauri.conf.json';
          const j = JSON.parse(fs.readFileSync(p, 'utf8'));
          j.bundle = j.bundle || {};
          j.bundle.createUpdaterArtifacts = false;
          fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          console.log('No TAURI_SIGNING_PRIVATE_KEY — createUpdaterArtifacts=false');
          NODE
          else
            echo "TAURI_SIGNING_PRIVATE_KEY present — updater artifacts enabled"
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ steps.ver.outputs.name }}
          releaseName: 'Zelari ${{ steps.ver.outputs.name }}'
          releaseBody: |
            ## Zelari ${{ steps.ver.outputs.name }}

            ### CLI (npm)
            ```bash
            npm i -g zelari-code@${{ steps.ver.outputs.plain }}
            zelari-code --version
            ```

            ### Desktop
            Installers attached below. **Desktop installer does not upgrade the CLI** —
            use `npm i -g zelari-code@${{ steps.ver.outputs.plain }}` (or Settings → Update CLI).

            ### Auto-update (Desktop app)
            Requires release assets signed with repo secret `TAURI_SIGNING_PRIVATE_KEY`.
            If that secret is missing, installers still ship but in-app update may be unavailable.
          releaseDraft: false
          prerelease: false
          args: ''
