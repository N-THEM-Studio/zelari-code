name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g. v1.9.4)'
        required: true

# Publishes BOTH the CLI (`zelari-code`) and the core library
# (`@zelari/core`) to the npm registry via Trusted Publishing (OIDC).
jobs:
  publish-core:
    name: Publish @zelari/core
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Resolve expected version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          TAG_VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Expected version: $TAG_VERSION (from $TAG)"

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          PKG_VERSION=$(node -e "console.log(require('./packages/core/package.json').version)")
          if [ "${{ steps.ver.outputs.version }}" != "$PKG_VERSION" ]; then
            echo "Tag version (${{ steps.ver.outputs.version }}) does not match packages/core/package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "✓ Tag matches packages/core @ $PKG_VERSION"

      - name: Build @zelari/core
        run: npm run build --workspace=@zelari/core

      - name: Typecheck (core)
        run: npm run typecheck --workspace=@zelari/core

      - name: Run tests (core)
        run: npm test --workspace=@zelari/core

      - name: Publish @zelari/core
        run: npm publish --workspace=@zelari/core --access public

  publish-cli:
    name: Publish zelari-code (CLI)
    needs: publish-core
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Resolve expected version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          TAG_VERSION="${TAG#v}"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          if [ "${{ steps.ver.outputs.version }}" != "$PKG_VERSION" ]; then
            echo "Tag version (${{ steps.ver.outputs.version }}) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "✓ Tag matches zelari-code @ $PKG_VERSION"

      - name: Build @zelari/core
        run: npm run build --workspace=@zelari/core

      - name: Typecheck
        run: npm run typecheck

      - name: Build CLI
        run: npm run build:cli

      - name: Run tests
        run: npm test

      - name: Smoke test bundled CLI
        run: npm run smoke

      - name: Publish zelari-code
        run: npm publish --access public
